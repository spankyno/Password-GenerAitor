<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Generador de contraseñas premium, 100% local, sin servidores, sin registro y enfocado en privacidad." />
    <meta name="theme-color" content="#0b0c0f" />
    <meta name="color-scheme" content="dark light" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Contraseñas" />

    <!--
      Content-Security-Policy estricta: la app es 100% cliente y no necesita
      cargar nada externo. self-only para scripts/estilos/imágenes/fuentes;
      sin conexiones salientes, sin objetos embebidos.
      Nota: 'frame-ancestors' no tiene efecto en un <meta> (solo vía cabecera
      HTTP), por eso se define en public/_headers para el despliegue en
      Cloudflare Pages, junto con el resto de cabeceras de seguridad.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    />

    <title>Generación de contraseñas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
