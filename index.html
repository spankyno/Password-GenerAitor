    <!--
      Content-Security-Policy estricta: la app es 100% cliente y no necesita
      cargar nada externo. self-only para scripts/estilos/imágenes/fuentes;
      sin conexiones salientes, sin objetos embebidos.
      Nota: 'frame-ancestors' no tiene efecto en un <meta> (solo vía cabecera
      HTTP), por eso se define en public/_headers para el despliegue en
      Cloudflare Pages, junto con el resto de cabeceras de seguridad.
      El bloque JSON-LD de abajo es type="application/ld+json": los
      navegadores no lo ejecutan como script, por lo que no requiere
      'unsafe-inline' en script-src.
    -->

  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' https://aitors-hub-dashboard.asanchezgu.workers.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://aitors-hub-dashboard.asanchezgu.workers.dev; object-src 'none'; base-uri 'self'; form-action 'self';"
/>
